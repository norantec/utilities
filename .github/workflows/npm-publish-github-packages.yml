# .github/workflows/publish.yml
name: Publish Node.js Package

on:
  push:
    branches:
      - master
      - alpha
      - beta
      - release

permissions:
  actions: write
  contents: read
  packages: write
  repository-projects: write
  id-token: write

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get and set shell variables
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          export ID_TOKEN=$(curl -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" $ACTIONS_ID_TOKEN_REQUEST_URL&audience=norantec)
          export ID_TOKEN=$(echo $ID_TOKEN | jq -r '.value')
          echo "ID_TOKEN=$ID_TOKEN"
          curl -L -X POST -o .env-$RUN_ID -H 'Content-Type: application/json' -H "Authorization: Bearer $ID_TOKEN" -H 'Accept: */*' -d @env.json https://endpoint.norantec.com/env
          cat .env-$RUN_ID

      - name: Upload Cache
        uses: actions/cache@v4
        with:
          key: env-${{ github.run_id }}
          path: .env-${{ github.run_id }}

  build:
    needs: init

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com/'

      - name: Install dependencies
        run: npm i --legacy-peer-deps=true

      - name: Run build
        run: npm run build

      - name: Pack-up cache
        run: |
          zip -r cache.zip dist

      - name: Upload cache
        uses: actions/cache@v4
        if: |
          github.ref == 'refs/heads/alpha' ||
          github.ref == 'refs/heads/beta' ||
          github.ref == 'refs/heads/release'
        with:
          key: cache-${{ github.run_id }}
          path: cache.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: |
      github.ref == 'refs/heads/alpha' ||
      github.ref == 'refs/heads/beta' ||
      github.ref == 'refs/heads/release'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com/'

      - name: Resume env cache
        uses: actions/cache@v4
        with:
          key: env-${{ github.run_id }}
          path: .env-${{ github.run_id }}

      - name: Resume env
        run: |
          awk '{ print }' .env-${{ github.run_id }} >> $GITHUB_ENV

      - name: Download cache
        uses: actions/cache@v4
        with:
          key: cache-${{ github.run_id }}
          path: cache.zip

      - name: Extract cache
        run: |
          unzip -o cache.zip

      - name: Check dist
        run: |
          ls -al ./dist

      - name: Install Norantec Toolchain
        run: npm i @open-norantec/toolchain -g --legacy-peer-deps=true

      - name: Release with semantic-release
        env:
          NPM_TOKEN: ${{ env.NPM_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: nttc bump --type $BRANCH_NAME --config ./bump.config.json

      - name: Prepare NPMRC
        env:
          NPM_TOKEN: ${{ env.NPM_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          echo "always-auth=true" >> ./.npmrc
          echo "@open-norantec:registry=https://registry.npmjs.org" >> ./.npmrc
          echo "//registry.npmjs.org/:_authToken=${{ env.NPM_TOKEN }}" >> ./.npmrc

      - name: Publish package
        run: npm publish
